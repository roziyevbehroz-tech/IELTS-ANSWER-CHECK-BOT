name: Deploy Edge Function

# Edge Function'ni (ielts-check) Supabase'ga avtomatik deploy qiladi.
# Talab: repo Settings → Secrets → Actions da `SUPABASE_ACCESS_TOKEN` bo'lishi kerak
#   (Supabase → Account → Access Tokens dan olinadi).
# BOT_TOKEN esa Supabase Edge Function Secrets'da turadi (bu yerda kerak emas).

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "data/answers/**"
      - "scripts/build_webapp_data.py"
      - ".github/workflows/deploy-edge-function.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: zanhdkzevinioaudgdgi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Javob-bazasini qayta generatsiya qilish (answers.json)
        run: python scripts/build_webapp_data.py

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Edge Function'ni deploy qilish
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret topilmadi. Repo Settings → Secrets → Actions ga qo'shing."
            exit 1
          fi
          supabase functions deploy ielts-check \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt
