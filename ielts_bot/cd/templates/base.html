<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
{{STYLES}}
    </style>
    <style>
        /* --- DREAM ZONE CD qo'shimchalari --- */
        .brand { display: flex; align-items: center; gap: 10px; }
        .brand-logo { height: 34px; width: auto; border-radius: 6px; }
        .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
        .brand-mark { font-weight: 800; font-size: 15px; color: #c1121f; letter-spacing: .3px; }
        .brand-sub { font-size: 11px; color: #6b7280; }
        .part-tabs { display: flex; gap: 8px; justify-content: center; padding: 8px; flex-wrap: wrap; }
        .part-tab { padding: 6px 16px; border: 1px solid #d1d5db; border-radius: 9999px; background: #fff; cursor: pointer; font-size: 14px; font-weight: 600; color: #374151; }
        .part-tab.active { background: #c1121f; color: #fff; border-color: #c1121f; }
        .multi-choice-option { border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; }
        .multi-choice-option label { padding: 6px 4px; }
        .multi-choice-option input { margin-right: 10px; transform: scale(1.2); }
        .results-hint { font-size: 14px; color: #374151; background: #f1f5f9; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; line-height: 1.5; }
        .muted { color: #9ca3af; }
        /* To'g'ri (qulflangan) javoblar — yashil, tahrirlanmaydi */
        .answer-input.correct, input.correct, select.correct { background: #e8f7ee !important; border-color: #1aa260 !important; color: #0b6b3a !important; }
        .answer-input:disabled { opacity: 1; cursor: default; }
        .matching-form-row.correct select:disabled { background: #e8f7ee; }
        #reveal-button { display: inline-block; margin: 8px 6px 0; padding: 10px 18px; background: #1f2a5a; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
        #modal-close { display: inline-block; margin: 8px 6px 0; padding: 10px 18px; background: #6b7280; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
        .modal-actions { text-align: center; margin-top: 14px; }
        .gap-input { display: inline-block; }
        .cd-table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        .cd-table th, .cd-table td { border: 1px solid #cbd5e1; padding: 8px 10px; text-align: left; vertical-align: top; }
        .cd-table th { background: #f1f5f9; }
        .opt-list { list-style: none; padding-left: 0; margin: 10px 0; }
        .opt-list li { padding: 3px 0; }
        .heading-bank { border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px 16px; background: #f9fafb; margin-bottom: 14px; }

        /* --- Izohli lug'at (*/** footnote) — passage oxirida --- */
        .passage-glossary { margin-top: 22px; padding-top: 10px; border-top: 1px solid #cbd5e1;
            font-size: 13px; color: #4b5563; line-height: 1.5; }
        .passage-glossary .gloss-item { margin: 4px 0; }
        .passage-glossary .gloss-mark { font-weight: 700; margin-right: 6px; color: #374151; }
        body.cd-dark .passage-glossary { border-top-color: #2a2a2e; color: #b8bcc4; }
        body.cd-dark .passage-glossary .gloss-mark { color: #e6e6e6; }

        /* --- Savol matni bold (variantlardan ajralib tursin) --- */
        .tf-question-text { font-weight: 700; color: #111827; }
        .multi-choice-question .question-prompt p { font-weight: 700; color: #111827; }
        .matching-form-label { font-weight: 700; color: #111827; }
        .multi-choice-option label { font-weight: 400; }   /* variantlar oddiy */

        /* --- Ixcham part-header (bir qatorli, tepaga yopishgan) --- */
        .part-header { background:#eef0e9; padding:6px 14px !important; margin:0 !important;
            border:0; border-bottom:1px solid #e0e0e0; border-radius:0; font-size:13.5px; color:#333; }
        .part-header p { display:inline; margin:0; }
        .part-header .ph-sep { color:#9ca3af; margin:0 6px; }
        #passage-header-container { position:sticky; top:0; z-index:5; }

        /* Vaqt tugaganda taymer qizil (faqat eslatma) */
        .timer-display.time-up { color:#c1121f; font-weight:700; }

        /* --- Highlight --- */
        .cd-hl { background:#fff59d; border-radius:2px; cursor:pointer; }
        .hl-popup { position:absolute; z-index:300; background:#1f2937; color:#fff;
            font-size:13px; font-weight:600; border-radius:9px; display:inline-flex; align-items:stretch;
            box-shadow:0 3px 12px rgba(0,0,0,.32); white-space:nowrap; user-select:none; overflow:hidden; }
        .hl-popup::after { content:""; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%);
            border:5px solid transparent; border-top-color:#1f2937; border-bottom:0; }
        .hl-act { padding:7px 12px; cursor:pointer; display:inline-flex; align-items:center; }
        .hl-act:hover { background:#111827; }
        .hl-plus { border-left:1px solid rgba(255,255,255,.18); font-size:18px; font-weight:400;
            color:#7ee2a8; padding:4px 12px; }
        .hl-plus:hover { background:#123524; color:#a9f0c6; }

        /* --- Mening lug'atim: tugma + hisob --- */
        #cd-vocab-btn { position:relative; background:none; border:none; cursor:pointer;
            padding:4px 6px; border-radius:8px; display:inline-flex; align-items:center; }
        #cd-vocab-btn svg { fill:#374151; }
        #cd-vocab-btn:hover { background:rgba(0,0,0,.06); }
        .cd-vocab-count { position:absolute; top:-2px; right:-2px; min-width:16px; height:16px;
            background:#16a34a; color:#fff; border-radius:9px; font-size:10px; font-weight:700;
            line-height:16px; text-align:center; padding:0 3px; }
        body.cd-dark #cd-vocab-btn svg { fill:#cfcfcf; }
        body.cd-dark #cd-vocab-btn:hover { background:rgba(255,255,255,.12); }

        /* --- Lug'at pop-up paneli (list ikonkasidan chuziladi) --- */
        .cd-vocab-panel { position:fixed; top:56px; right:12px; width:400px; max-width:94vw;
            max-height:70vh; background:#fff; border:1px solid #e5e7eb; border-radius:14px;
            box-shadow:0 12px 34px rgba(0,0,0,.22); z-index:350; display:flex; flex-direction:column;
            overflow:hidden; transform-origin:top right; transform:scale(.82); opacity:0;
            transition:transform .22s cubic-bezier(.2,.85,.25,1), opacity .18s ease; pointer-events:none; }
        .cd-vocab-panel.show { transform:scale(1); opacity:1; pointer-events:auto; }
        .cd-vocab-head { display:flex; align-items:center; gap:8px;
            padding:11px 12px; border-bottom:1px solid #eef0f2; }
        .cd-vocab-title { flex:1; font-weight:800; font-size:15px; color:#111827; }
        .cd-vocab-copy { background:none; border:none; cursor:pointer; padding:3px 6px; border-radius:7px;
            color:#6b7280; display:inline-flex; align-items:center; }
        .cd-vocab-copy svg { fill:currentColor; }
        .cd-vocab-copy:hover { background:#f1f5f9; color:#16a34a; }
        .cd-vocab-copy.copied { color:#16a34a; background:#e7f6ee; }
        .cd-vocab-x { background:none; border:none; font-size:16px; cursor:pointer; color:#6b7280;
            padding:2px 6px; border-radius:6px; }
        .cd-vocab-x:hover { background:#f1f5f9; color:#111827; }
        .cd-vocab-empty { padding:22px 16px; text-align:center; color:#9ca3af; font-size:13.5px; line-height:1.5; }
        .cd-vocab-cols { display:flex; gap:8px; padding:6px 12px 2px; font-size:11.5px; font-weight:700;
            color:#9ca3af; text-transform:uppercase; letter-spacing:.4px; }
        .cd-vocab-cols .c-w { flex:0 0 42%; }
        .cd-vocab-cols .c-t { flex:1; }
        .cd-vocab-list { overflow-y:auto; padding:4px 6px 8px; }
        .cd-vocab-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:9px;
            transition:background .12s, max-height .2s ease, opacity .2s ease, padding .2s ease;
            max-height:76px; overflow:hidden; }
        .cd-vocab-item:hover { background:#f8fafc; }
        .cd-vocab-item.removing { max-height:0; opacity:0; padding-top:0; padding-bottom:0; }
        .cd-vocab-word { flex:0 0 42%; font-size:14px; font-weight:600; color:#111827; word-break:break-word; }
        .cd-vocab-tr { flex:1 1 auto; min-width:0; border:1px solid #e5e7eb; border-radius:7px;
            padding:5px 8px; font-size:13.5px; color:#111827; background:#fff; }
        .cd-vocab-tr:focus { outline:none; border-color:#16a34a; }
        /* Uchib boradigan nuqta + list ikonka "bump" */
        .cd-fly-dot { position:fixed; width:12px; height:12px; border-radius:50%; background:#16a34a;
            box-shadow:0 0 10px rgba(22,163,74,.7); z-index:500; pointer-events:none;
            transition:transform .5s cubic-bezier(.5,0,.3,1), opacity .5s ease; }
        #cd-vocab-btn.cd-vocab-bump { animation:cdVocabBump .28s ease; }
        @keyframes cdVocabBump { 0%{transform:scale(1)} 40%{transform:scale(1.35)} 100%{transform:scale(1)} }
        .cd-vocab-del { flex:0 0 auto; width:28px; height:28px; border:none; background:#fdecef; color:#d8345b;
            border-radius:8px; cursor:pointer; font-size:14px; display:inline-flex; align-items:center;
            justify-content:center; transition:background .12s, transform .1s; }
        .cd-vocab-del:hover { background:#fbd5dd; }
        .cd-vocab-del:active { transform:scale(.9); }
        .cd-vocab-cf { display:none; gap:4px; }
        .cd-vocab-item.confirming .cd-vocab-del { display:none; }
        .cd-vocab-item.confirming .cd-vocab-cf { display:inline-flex; }
        .cd-vocab-item.confirming { background:#fdecef; }
        .cd-vocab-yes, .cd-vocab-no { width:28px; height:28px; border:none; border-radius:8px; cursor:pointer;
            font-size:14px; display:inline-flex; align-items:center; justify-content:center; }
        .cd-vocab-yes { background:#d8345b; color:#fff; }
        .cd-vocab-yes:hover { background:#b0102f; }
        .cd-vocab-no { background:#e5e7eb; color:#374151; }
        .cd-vocab-no:hover { background:#d1d5db; }
        body.cd-dark .cd-vocab-panel { background:#17171b; border-color:#2a2a2e; }
        body.cd-dark .cd-vocab-head { border-bottom-color:#2a2a2e; }
        body.cd-dark .cd-vocab-title, body.cd-dark .cd-vocab-word { color:#f0f0f0; }
        body.cd-dark .cd-vocab-x { color:#9aa0a6; }
        body.cd-dark .cd-vocab-x:hover { background:#26262d; color:#fff; }
        body.cd-dark .cd-vocab-item:hover { background:#1e1e24; }
        body.cd-dark .cd-vocab-del { background:#2a1720; color:#f08ba3; }
        body.cd-dark .cd-vocab-del:hover { background:#3a1f2a; }
        body.cd-dark .cd-vocab-item.confirming { background:#2a1720; }
        body.cd-dark .cd-vocab-no { background:#33333a; color:#d8d8d8; }
        body.cd-dark .cd-vocab-tr { background:#1c1c22; color:#f0f0f0; border-color:#3a3a42; }
        body.cd-dark .cd-vocab-tr:focus { border-color:#1aa260; }
        body.cd-dark .cd-vocab-copy { color:#9aa0a6; }
        body.cd-dark .cd-vocab-copy:hover { background:#26262d; color:#7ee2a8; }
        body.cd-dark .cd-vocab-copy.copied { color:#7ee2a8; background:#123524; }
        body.cd-dark .cd-vocab-cols { color:#6b6b73; }

        /* Faol savol belgisi — faqat joriy savol oldida nozik qizil chiziq */
        .q-active { box-shadow:-2px 0 0 0 #d8556f; border-radius:3px; padding-left:8px; }

        /* --- Pastki ixcham Part navigatsiyasi (IDP uslubi) --- */
        .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:60px; background:#fff;
            border-top:1px solid #e0e0e0; display:flex; align-items:stretch; z-index:100;
            box-shadow:0 -2px 8px rgba(0,0,0,.06); }
        .bn-parts { flex:1; display:flex; align-items:stretch; overflow-x:auto; }
        .bn-part { display:flex; align-items:center; gap:6px; padding:0 14px; border-right:1px solid #eef0f2; flex:0 0 auto; }
        .bn-part.active { background:#faf7f7; }
        .bn-label { border:none; background:none; font-size:14px; font-weight:700; color:#374151; cursor:pointer; padding:4px 2px; white-space:nowrap; }
        .bn-part.active .bn-label { color:#c1121f; }
        .bn-count { font-size:13px; color:#6b7280; }
        .bn-chips { display:flex; gap:3px; flex-wrap:nowrap; }
        .bn-q { width:26px; height:26px; border:1px solid #d1d5db; background:#fff; border-radius:5px;
            font-size:12.5px; color:#374151; cursor:pointer; padding:0; }
        .bn-q:hover { background:#f3f4f6; }
        .bn-q.answered { background:#111827; color:#fff; border-color:#111827; }
        .bn-q.current { outline:2px solid #c1121f; outline-offset:1px; }
        .bn-deliver { flex:0 0 auto; margin:8px 14px; padding:0 26px; background:#16a34a; color:#fff;
            border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; }
        .bn-deliver:hover { background:#15803d; }

        /* Strelkalarni pastki panel ustiga ko'taramiz + kichraytiramiz */
        .nav-arrows { bottom:72px !important; }
        .nav-arrow { width:42px !important; height:42px !important; border-radius:8px; }

        /* Text ekranini kattalashtirish uchun main-container'ni pastki panelga moslash */
        .main-container { height: calc(100vh - 60px - 60px) !important; }

        /* --- Flow-chart completion --- */
        .flowchart { max-width: 560px; margin: 10px auto; }
        .fc-box { border: 1.5px solid #374151; border-radius: 4px; padding: 12px 14px;
            background: #fff; line-height: 1.9; font-size: 15px; }
        .fc-arrow { text-align: center; color: #374151; font-size: 22px; line-height: 1.1; margin: 2px 0; }

        /* --- Diagram label completion --- */
        .diagram-block { max-width: 640px; margin: 8px auto; }
        .diagram-images { text-align: center; margin: 8px 0 14px; }
        .diagram-img { max-width: 100%; height: auto; border: 1px solid #e5e7eb; border-radius: 6px; }
        .diagram-drop { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 26px 16px;
            text-align: center; color: #6b7280; background: #f8fafc; margin: 8px 0 14px; font-size: 14px; }
        .diagram-rows { display: flex; flex-direction: column; gap: 8px; max-width: 380px; margin: 0 auto; }
        .diagram-row { display: flex; align-items: center; gap: 10px; }
        .diagram-lbl { flex: 0 0 30px; height: 30px; display: inline-flex; align-items: center;
            justify-content: center; font-weight: 700; color: #111827; border: 1px solid #d1d5db;
            border-radius: 6px; background: #fff; }
        .diagram-row .answer-input { flex: 1; }

        /* --- Yakka (joyida) tekshirish tugmasi + urinishlar soni --- */
        .q-check-wrap { display: inline-flex; align-items: center; gap: 4px; margin-left: 6px; vertical-align: middle; }
        .q-check { width: 24px; height: 24px; border: 1px solid #cbd5e1; background: #fff; color: #16a34a;
            border-radius: 50%; cursor: pointer; font-size: 14px; line-height: 1; padding: 0;
            display: inline-flex; align-items: center; justify-content: center; transition: background .15s, transform .1s; }
        .q-check:hover { background: #ecfdf5; }
        .q-check:active { transform: scale(0.9); }
        .q-check.q-ok { color: #fff; background: #16a34a; border-color: #16a34a; }
        .q-tries { font-size: 11px; color: #b6bcc7; min-width: 10px; text-align: center; user-select: none; }
        .q-tries.solved { color: #86c9a4; font-weight: 600; }

        /* --- Yuqoridan tushadigan ogohlantirish (toast) --- */
        .cd-toast { position: fixed; top: 0; left: 50%; transform: translate(-50%, -130%);
            z-index: 400; padding: 12px 22px; border-radius: 0 0 14px 14px; font-size: 15px;
            font-weight: 600; color: #fff; box-shadow: 0 6px 18px rgba(0,0,0,.22); max-width: 92vw;
            text-align: center; pointer-events: none;
            transition: transform .5s cubic-bezier(.2,.85,.25,1); }
        .cd-toast.show { transform: translate(-50%, 0); }
        .cd-toast.ok { background: #16a34a; }
        .cd-toast.err { background: #d8345b; }
        .cd-toast.info { background: #6b7280; }

        /* --- Tahrirlash: rasmlarni o'chirish (✖) --- */
        .cd-img-wrap { position: relative; display: inline-block; max-width: 100%; }
        .cd-deletable { outline: 2px dashed #d8345b; outline-offset: 2px; }
        .cd-img-del { position: absolute; top: 4px; right: 4px; width: 26px; height: 26px;
            border-radius: 50%; border: none; background: #d8345b; color: #fff; font-size: 13px;
            cursor: pointer; z-index: 6; display: inline-flex; align-items: center;
            justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,.3); }
        .cd-img-del:hover { background: #b0102f; }

        /* ========================= DARK MODE ========================= */
        #cd-theme-toggle { background: none; border: none; cursor: pointer; font-size: 18px;
            line-height: 1; padding: 4px 6px; border-radius: 8px; }
        #cd-theme-toggle:hover { background: rgba(0,0,0,.06); }
        #cd-lang-toggle { background: none; border: 1px solid #d1d5db; cursor: pointer;
            font-size: 12px; font-weight: 700; color: #374151; line-height: 1;
            padding: 5px 8px; border-radius: 999px; white-space: nowrap; }
        #cd-lang-toggle:hover { background: rgba(0,0,0,.06); }
        body.cd-dark #cd-lang-toggle { color: #d8d8d8; border-color: #4a4a52; }
        body.cd-dark #cd-lang-toggle:hover { background: rgba(255,255,255,.12); }

        body.cd-dark { background: #0d0d0f; color: #e6e6e6; }
        body.cd-dark::after { color: #ffffff; opacity: 0.05; }   /* watermark */
        body.cd-dark #cd-theme-toggle:hover { background: rgba(255,255,255,.12); }

        body.cd-dark .header { background: #151518; border-bottom-color: #2a2a2e; }
        body.cd-dark .timer-display { color: #e6e6e6; }
        body.cd-dark .timer-controls svg { fill: #cfcfcf; }
        body.cd-dark .brand-sub { color: #9aa0a6; }
        body.cd-dark .telegram-link { color: #e6e6e6; border-color: #4a4a52; }

        body.cd-dark .main-container,
        body.cd-dark .passage-panel,
        body.cd-dark .questions-panel { background: #0d0d0f; color: #e6e6e6; }
        body.cd-dark .questions-panel { border-left-color: #2a2a2e; }
        body.cd-dark .reading-passage h4,
        body.cd-dark .reading-passage p,
        body.cd-dark .reading-passage strong { color: #f0f0f0; }

        body.cd-dark #passage-header-container { background: #0d0d0f; }
        body.cd-dark .part-header { background: #1a1a1f; color: #d8d8d8; border-bottom-color: #2a2a2e; }
        body.cd-dark .part-header strong { color: #fff; }

        /* Kirish maydonlari */
        body.cd-dark .answer-input,
        body.cd-dark input[type="text"],
        body.cd-dark select,
        body.cd-dark .gap-input { background: #1c1c22 !important; color: #f0f0f0 !important; border-color: #3a3a42 !important; }
        body.cd-dark input[type="text"]::placeholder,
        body.cd-dark .gap-input::placeholder { color: #7a7a82; }
        /* To'g'ri (yashil) qulflangan javob — quyuq yashil */
        body.cd-dark .answer-input.correct,
        body.cd-dark input.correct,
        body.cd-dark select.correct { background: #123524 !important; color: #7ee2a8 !important; border-color: #1aa260 !important; }

        /* Statement / MCQ / matching */
        body.cd-dark .tf-question-text,
        body.cd-dark .multi-choice-question .question-prompt p,
        body.cd-dark .matching-form-label,
        body.cd-dark .question-prompt,
        body.cd-dark .tf-option,
        body.cd-dark .multi-choice-option label,
        body.cd-dark .notes-content,
        body.cd-dark .diagram-lbl { color: #f0f0f0; }
        body.cd-dark .tf-question-text,
        body.cd-dark .multi-choice-question .question-prompt p,
        body.cd-dark .matching-form-label { color: #ffffff; }
        body.cd-dark .multi-choice-option { border-color: #33333a; background: #151518; }
        body.cd-dark .heading-bank,
        body.cd-dark .cd-table th { background: #17171b; border-color: #2a2a2e; color: #e6e6e6; }
        body.cd-dark .cd-table td { border-color: #2a2a2e; }
        body.cd-dark .diagram-lbl { background: #1c1c22; border-color: #3a3a42; color: #f0f0f0; }
        body.cd-dark .diagram-drop { background: #151518; color: #9aa0a6; border-color: #3a3a42; }
        body.cd-dark .diagram-img { border-color: #2a2a2e; }

        /* Flow-chart */
        body.cd-dark .fc-box { background: #17171b; border-color: #4a4a52; color: #f0f0f0; }
        body.cd-dark .fc-arrow { color: #cfcfcf; }

        /* Pastki navigatsiya */
        body.cd-dark .bottom-nav { background: #151518; border-top-color: #2a2a2e; }
        body.cd-dark .bn-part { border-right-color: #26262b; }
        body.cd-dark .bn-part.active { background: #1e1e24; }
        body.cd-dark .bn-label { color: #d8d8d8; }
        body.cd-dark .bn-count { color: #9aa0a6; }
        body.cd-dark .bn-q { background: #1c1c22; color: #d8d8d8; border-color: #3a3a42; }
        body.cd-dark .bn-q:hover { background: #26262d; }
        body.cd-dark .bn-q.answered { background: #2563eb; color: #fff; border-color: #2563eb; }

        /* Natija oynasi (modal) */
        body.cd-dark .modal-content { background: #17171b; color: #e6e6e6; }
        body.cd-dark .modal-content h2 { color: #fff; }
        body.cd-dark .results-hint { background: #1e1e24; color: #d8d8d8; }
        body.cd-dark .result-row { border-bottom-color: #2a2a2e; }
        body.cd-dark .result-row.correct { background: #12241a; }
        body.cd-dark .result-row.incorrect { background: #2a1720; }
        body.cd-dark .result-row .q-num { background: #1c1c22; color: #eee; border-color: #3a3a42; }
        body.cd-dark .result-row .user-ans { background: #1c1c22; color: #ddd; border-color: #33333a; }
        body.cd-dark .result-row .correct-ans { background: #12241a; color: #7ee2a8; border-color: #1aa260; }
        body.cd-dark .row-eye { background: #1c1c22; border-color: #3a3a42; }

        /* Ixchamliklar */
        body.cd-dark .part-header .ph-sep { color: #6b6b73; }
        body.cd-dark .q-tries { color: #6b6b73; }
        body.cd-dark .q-check { background: #1c1c22; border-color: #3a3a42; }
        body.cd-dark .cd-hl { background: #7c6f1e; color: #fff; }
        body.cd-dark .resizer { background-color: #2a2a2e; border-color: #3a3a42; }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">
            {{LOGO}}
            <div class="brand-text">
                <span class="brand-mark">{{BRAND}}</span>
                <span class="brand-sub">IELTS Reading</span>
            </div>
        </div>
        <div class="timer-container">
            <span class="timer-display">60:00</span>
            <div class="timer-controls">
                <button id="timer-toggle-btn" data-i18n-title="timer_toggle" title="Pause/Resume">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
                </button>
                <button id="timer-reset-btn" data-i18n-title="timer_reset" title="Reset">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                </button>
                <button id="cd-vocab-btn" data-i18n-title="vocab_title" title="Mening lug'atim" aria-label="vocabulary">
                    <svg xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 0 24 24" width="22"><path d="M4 6h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm4-10h12v2H8zm0 5h12v2H8zm0 5h12v2H8z"/></svg>
                    <span id="cd-vocab-count" class="cd-vocab-count hidden">0</span>
                </button>
                <button id="cd-lang-toggle" title="Til / Язык / Language" aria-label="language">🌐 UZ</button>
                <button id="cd-theme-toggle" data-i18n-title="theme_toggle" title="Tungi/kunduzgi rejim" aria-label="theme">🌙</button>
            </div>
        </div>
        {{TELEGRAM_LINK}}
    </div>

    <!-- Mening lug'atim — silliq ochiladigan pop-up jadval -->
    <div id="cd-vocab-panel" class="cd-vocab-panel">
        <div class="cd-vocab-head">
            <button id="cd-vocab-copy" class="cd-vocab-copy" data-i18n-title="vocab_copy_title" title="Barchasini nusxalash" aria-label="copy">
                <svg xmlns="http://www.w3.org/2000/svg" height="18" viewBox="0 0 24 24" width="18"><path d="M16 1H4a2 2 0 0 0-2 2v12h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
            <span class="cd-vocab-title" data-i18n="vocab_title">Mening lug'atim</span>
            <button id="cd-vocab-close" class="cd-vocab-x" aria-label="close">✕</button>
        </div>
        <div id="cd-vocab-empty" class="cd-vocab-empty" data-i18n="vocab_empty">Matndan so'z belgilab ＋ ni bosing.</div>
        <div id="cd-vocab-cols" class="cd-vocab-cols hidden">
            <span class="c-w" data-i18n="vocab_col_word">So'z</span>
            <span class="c-t" data-i18n="vocab_col_tr">Tarjima</span>
        </div>
        <div id="cd-vocab-list" class="cd-vocab-list"></div>
    </div>

    <button id="cd-edit-toggle" data-i18n-title="edit_mode" data-i18n-aria="edit_mode" title="Tahrirlash rejimi" aria-label="Tahrirlash">✏️</button>
    <div id="cd-toolbar" class="cd-toolbar hidden">
        <button data-cmd="bold" data-i18n-title="fmt_bold" title="Qalin"><b>B</b></button>
        <button data-cmd="italic" data-i18n-title="fmt_italic" title="Kursiv"><i>I</i></button>
        <button data-cmd="underline" data-i18n-title="fmt_underline" title="Tagchiziq"><u>U</u></button>
        <span class="sep"></span>
        <button data-cmd="justifyLeft" data-i18n-title="align_left" title="Chapga">⬅</button>
        <button data-cmd="justifyCenter" data-i18n-title="align_center" title="Markaz">▣</button>
        <button data-cmd="justifyRight" data-i18n-title="align_right" title="O'ngga">➡</button>
        <span class="sep"></span>
        <button data-size="up" data-i18n-title="size_up" title="Kattalashtirish">A+</button>
        <button data-size="down" data-i18n-title="size_down" title="Kichiklashtirish">A−</button>
        <span class="sep"></span>
        <button id="cd-save" class="primary" data-i18n-title="save_title" data-i18n="btn_save" title="Yakuniy faylni saqlash">💾 Saqlash</button>
        <button id="cd-exit" class="exit" data-i18n-title="exit_title" title="Chiqish">✖</button>
        <span class="cd-hint" data-i18n="edit_hint">Matn/savollarni tahrirlang · rasmlarni ✖ bilan o'chiring</span>
    </div>

    <div id="hl-popup" class="hl-popup hidden">
        <span id="hl-mark" class="hl-act" data-i18n="hl_add">🖍 Highlight</span>
        <span id="hl-add" class="hl-act hl-plus" data-i18n-title="vocab_add_title" title="Lug'atga qo'shish">＋</span>
    </div>
    <div id="cd-toast" class="cd-toast"></div>

    <div class="main-container" id="main-container">
        <div id="passage-header-container">
{{PART_HEADERS}}
        </div>
        <div class="panels-container">
            <div class="passage-panel" id="passage-panel">
{{PASSAGES}}
            </div>
            <div class="resizer" id="resizer"></div>
            <div class="questions-panel" id="questions-panel">
{{QUESTION_SETS}}
            </div>
        </div>
    </div>

    <div class="nav-arrows">
        <button class="nav-arrow prev" id="prevBtn" data-i18n-aria="prev_part" aria-label="Previous part">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" fill="#fff"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button class="nav-arrow next" id="nextBtn" data-i18n-aria="next_part" aria-label="Next part">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" fill="#fff"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
    </div>

    <div id="bottom-nav" class="bottom-nav">
        <div id="bn-parts" class="bn-parts"></div>
        <button id="deliver-button" data-i18n-aria="deliver" aria-label="Submit answers" class="bn-deliver" data-i18n="deliver">Deliver ✓</button>
    </div>

    <div id="results-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>🎓 {{BRAND}} — <span data-i18n="results">Natija</span></h2>
            <div class="results-summary">
                <p><span data-i18n="score">Score:</span> <strong><span id="results-score"></span> / {{TOTAL}}</strong></p>
                <p><span data-i18n="band">IELTS Band:</span> <strong><span id="results-band"></span></strong></p>
            </div>
            <div id="results-hint" class="results-hint"></div>
            <div id="results-details" class="results-details-container"></div>
            <div class="modal-actions">
                <button id="reveal-button" data-i18n="reveal">👁 Javoblarni ko'rish</button>
                <button id="modal-close" data-i18n="close_fix">✏️ Yopish va tuzatish</button>
            </div>
        </div>
    </div>

    <script>
    window.CD_DATA = {{DATA_JSON}};
    </script>
    <script>
{{APP_JS}}
    </script>
</body>
</html>
